groups:
  - name: gozero-api
    rules:
      - alert: GozeroApiSecurityConfigEvents
        expr: sum by (app_id, reason) (rate(gozero_api_auth_security_events_total{category="security_config"}[5m])) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "gozero-api security config error"
          description: "app_id={{ $labels.app_id }} reason={{ $labels.reason }} has security_config events."

      - alert: GozeroApiSecurityFailedSpike
        expr: sum by (app_id, reason) (rate(gozero_api_auth_security_events_total{action="security_failed"}[5m])) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "gozero-api security failures increased"
          description: "app_id={{ $labels.app_id }} reason={{ $labels.reason }} has more than 5 security failures per second."

      - alert: GozeroApiCollectorEnqueueFailed
        expr: sum by (transport) (rate(gozero_api_collector_enqueue_events_total{result!="success"}[5m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "gozero-api Collector enqueue failed"
          description: "Collector transport={{ $labels.transport }} has enqueue failures."

      - alert: GozeroApiCollectorProcessorFailed
        expr: sum by (biz_type) (rate(gozero_api_collector_processor_batch_duration_seconds_count{result="failed"}[5m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "gozero-api Collector processor failed"
          description: "Collector biz_type={{ $labels.biz_type }} has failed processor batches."
